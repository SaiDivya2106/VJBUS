name: complaints-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/be1-complaints/**"
      - "frontend/fe1-complaints/**"
      - "deploy/docker-compose.complaints.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/be1-complaints/**"
      - "frontend/fe1-complaints/**"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push private images to GHCR below
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend/be1-complaints
        run: npm ci
      - name: Lint backend
        working-directory: backend/be1-complaints
        run: npm run lint -- --max-warnings=0 || true   # remove "|| true" once a lint script exists

      - name: Install frontend dependencies
        working-directory: frontend/fe1-complaints
        run: npm ci
      - name: Lint frontend
        working-directory: frontend/fe1-complaints
        run: npm run lint -- --max-warnings=0 || true

      - name: Build backend image
        run: docker build -t complaints-backend ./backend/be1-complaints

      - name: Build frontend image
        run: |
          docker build -t complaints-frontend \
            --build-arg VITE_API_URL=https://complaints.vjstartup.com/be/api \
            ./frontend/fe1-complaints

      - name: Login to GitHub Container Registry (private, no extra secrets needed)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images to GHCR (private by default for a private repo)
        if: github.event_name == 'push'
        run: |
          docker tag complaints-backend ghcr.io/headiie/complaints-backend:latest
          docker tag complaints-frontend ghcr.io/headiie/complaints-frontend:latest
          docker push ghcr.io/headiie/complaints-backend:latest
          docker push ghcr.io/headiie/complaints-frontend:latest

  deploy:
    needs: build-and-lint
    if: github.event_name == 'push'
    runs-on: self-hosted   # the runner registered to the vjservers repo
    steps:
      - uses: actions/checkout@v4

      - name: Deploy ONLY the complaints app's containers
        run: |
          docker compose -f deploy/docker-compose.complaints.yml down
          docker compose -f deploy/docker-compose.complaints.yml up -d --build
          docker image prune -f
          docker compose -f deploy/docker-compose.complaints.yml ps
