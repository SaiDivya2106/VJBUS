name: complaints-app

services:
  mongo:
    image: mongo:7
    container_name: complaints-mongo
    ports:
      - "27318:27017"   # next free Mongo block on BETA - check this is free before using (see guide)
    volumes:
      - /home/campus/complaints-mongodata:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ../backend/be1-complaints
    container_name: complaints-backend
    ports:
      - "6309:5000"     # next free backend block on BETA
    environment:
      - MONGO_URI=mongodb://mongo:27017/complaintsdb
      - PORT=5000
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend/fe1-complaints
      args:
        VITE_API_URL: https://complaints.vjstartup.com/be/api
    container_name: complaints-frontend
    ports:
      - "3309:5173"     # next free frontend block on BETA
    depends_on:
      - backend
    restart: unless-stopped
